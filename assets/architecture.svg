<svg width="100%" viewBox="0 0 700 760" xmlns="http://www.w3.org/2000/svg" role="img">
<title>peer-review pattern の StateGraph 構造</title>
<desc>selector で N 視点を選定し、Round 1 で並列に下書き生成、round2_router 経由で peer-review 有無を判定し、Round 2 で並列に改訂、synthesizer が統合、assembly で最終レポート組立。</desc>

<style>
.t  { font-family: sans-serif; font-size: 14px; font-weight: 400; }
.ts { font-family: sans-serif; font-size: 12px; font-weight: 400; }
.th { font-family: sans-serif; font-size: 14px; font-weight: 500; }
.tx { font-family: sans-serif; font-size: 11px; font-weight: 400; }
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- START -->
<rect x="280" y="20" width="140" height="36" rx="8" fill="#444441" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="th" x="350" y="38" text-anchor="middle" dominant-baseline="central" fill="#F1EFE8">START</text>
<line x1="350" y1="58" x2="350" y2="80" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- selector -->
<rect x="250" y="84" width="200" height="56" rx="8" fill="#085041" stroke="#9FE1CB" stroke-width="0.5"/>
<text class="th" x="350" y="102" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE">selector</text>
<text class="ts" x="350" y="122" text-anchor="middle" dominant-baseline="central" fill="#9FE1CB">PerspectiveSelector (N 視点を選定)</text>
<line x1="350" y1="142" x2="350" y2="164" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="tx" x="465" y="155" fill="#B4B2A9">fan_out (Send)</text>

<!-- R1 paths (stacked × N representation) -->
<rect x="258" y="186" width="200" height="56" rx="8" fill="#5A1F0E" stroke="#F5C4B3" stroke-width="0.5" opacity="0.7"/>
<rect x="254" y="183" width="200" height="56" rx="8" fill="#6B2510" stroke="#F5C4B3" stroke-width="0.5" opacity="0.85"/>
<rect x="250" y="180" width="200" height="56" rx="8" fill="#712B13" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="th" x="350" y="198" text-anchor="middle" dominant-baseline="central" fill="#FAECE7">path_executor</text>
<text class="ts" x="350" y="218" text-anchor="middle" dominant-baseline="central" fill="#F5C4B3">Round 1: 視点別下書き × N (parallel)</text>
<line x1="350" y1="248" x2="350" y2="270" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- round2_router (no-op gate) -->
<rect x="270" y="274" width="160" height="36" rx="8" fill="#444441" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="th" x="350" y="286" text-anchor="middle" dominant-baseline="central" fill="#F1EFE8">round2_router</text>
<text class="tx" x="350" y="302" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9">no-op gate (0.00s)</text>
<line x1="350" y1="310" x2="350" y2="332" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- decide_round2 (conditional) -->
<rect x="240" y="336" width="220" height="56" rx="8" fill="#633806" stroke="#FAC775" stroke-width="0.5"/>
<text class="th" x="350" y="354" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA">decide_round2</text>
<text class="ts" x="350" y="374" text-anchor="middle" dominant-baseline="central" fill="#FAC775">条件分岐: peer_review enabled?</text>

<!-- left branch: peer_review on → R2 fan-out -->
<line x1="350" y1="392" x2="350" y2="436" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="tx" x="190" y="416" fill="#B4B2A9">peer_review on:</text>
<text class="tx" x="190" y="430" fill="#B4B2A9">fan_out (Send) で R2 並列実行</text>

<!-- right branch: peer_review off → synthesizer (curved dashed) -->
<path d="M 460 364 Q 620 364 620 568 L 460 568" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="tx" x="540" y="438" fill="#F0997B">peer_review off:</text>
<text class="tx" x="540" y="452" fill="#F0997B">R2 を skip</text>
<text class="tx" x="540" y="466" fill="#F0997B">→ synthesizer 直行</text>

<!-- R2 paths (stacked × N) -->
<rect x="258" y="446" width="200" height="56" rx="8" fill="#5A1F0E" stroke="#F5C4B3" stroke-width="0.5" opacity="0.7"/>
<rect x="254" y="443" width="200" height="56" rx="8" fill="#6B2510" stroke="#F5C4B3" stroke-width="0.5" opacity="0.85"/>
<rect x="250" y="440" width="200" height="56" rx="8" fill="#712B13" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="th" x="350" y="458" text-anchor="middle" dominant-baseline="central" fill="#FAECE7">path_executor_round2</text>
<text class="ts" x="350" y="478" text-anchor="middle" dominant-baseline="central" fill="#F5C4B3">Round 2: 他視点 draft を読んで改訂 × N</text>
<line x1="350" y1="508" x2="350" y2="540" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- synthesizer -->
<rect x="250" y="544" width="200" height="56" rx="8" fill="#0C447C" stroke="#B5D4F4" stroke-width="0.5"/>
<text class="th" x="350" y="562" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB">synthesizer</text>
<text class="ts" x="350" y="582" text-anchor="middle" dominant-baseline="central" fill="#B5D4F4">CrossPathSynthesizer (Heavy LLM)</text>
<line x1="350" y1="602" x2="350" y2="624" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- assembly -->
<rect x="270" y="628" width="160" height="36" rx="8" fill="#444441" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="th" x="350" y="640" text-anchor="middle" dominant-baseline="central" fill="#F1EFE8">assembly</text>
<text class="tx" x="350" y="656" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9">no-LLM (コード組立)</text>
<line x1="350" y1="664" x2="350" y2="686" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- END -->
<rect x="280" y="690" width="140" height="36" rx="8" fill="#444441" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="th" x="350" y="708" text-anchor="middle" dominant-baseline="central" fill="#F1EFE8">END</text>

<!-- Legend -->
<rect x="30" y="740" width="14" height="14" rx="2" fill="#085041" stroke="#9FE1CB" stroke-width="0.5"/>
<text class="ts" x="50" y="747" dominant-baseline="central" fill="#B4B2A9">Light LLM</text>
<rect x="130" y="740" width="14" height="14" rx="2" fill="#712B13" stroke="#F5C4B3" stroke-width="0.5"/>
<text class="ts" x="150" y="747" dominant-baseline="central" fill="#B4B2A9">Tavily 含む LLM (並列 × N)</text>
<rect x="350" y="740" width="14" height="14" rx="2" fill="#633806" stroke="#FAC775" stroke-width="0.5"/>
<text class="ts" x="370" y="747" dominant-baseline="central" fill="#B4B2A9">条件分岐</text>
<rect x="450" y="740" width="14" height="14" rx="2" fill="#0C447C" stroke="#B5D4F4" stroke-width="0.5"/>
<text class="ts" x="470" y="747" dominant-baseline="central" fill="#B4B2A9">Heavy LLM</text>
<rect x="560" y="740" width="14" height="14" rx="2" fill="#444441" stroke="#D3D1C7" stroke-width="0.5"/>
<text class="ts" x="580" y="747" dominant-baseline="central" fill="#B4B2A9">no-LLM / 構造</text>
</svg>
